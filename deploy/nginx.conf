# /etc/nginx/sites-available/claideco.work
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/claideco.work /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name claideco.work www.claideco.work;

    # Redirect HTTP to HTTPS (certbot will manage this after SSL setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name claideco.work www.claideco.work;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/claideco.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claideco.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend — Vue SPA
    root /var/www/claideco.work;
    index index.html;

    # All non-API, non-file requests go to index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy to FastAPI
    location /v1/ {
        proxy_pass         http://127.0.0.1:8000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # File upload timeout (receipts can be large)
        proxy_read_timeout 120s;
        client_max_body_size 25M;
    }

    # Uploads served directly by Nginx (faster than going through FastAPI)
    location /uploads/ {
        alias /var/www/pesobooks-uploads/;
        internal;
    }

    # Gzip for frontend assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
